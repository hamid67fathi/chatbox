global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "chatbox-api"
    static_configs:
      - targets: ["host.docker.internal:3001"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "chatbox-ai-service"
    static_configs:
      - targets: ["host.docker.internal:8000"]
    metrics_path: /metrics
    scrape_interval: 30s

  - job_name: "postgres-exporter"
    static_configs:
      - targets: ["host.docker.internal:9187"]
    scrape_interval: 30s

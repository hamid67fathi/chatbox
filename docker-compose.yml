# Local dev: Postgres + Redis (Ubuntu / Docker CE). See docs/14-INFRASTRUCTURE.md §5.
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: chatbox-postgres
    environment:
      POSTGRES_USER: chatbox
      POSTGRES_PASSWORD: chatbox
      POSTGRES_DB: chatbox
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init-extensions.sql:/docker-entrypoint-initdb.d/init-extensions.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbox -d chatbox"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chatbox-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatBox Widget Demo</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 40px;
      background: #f8fafc;
      direction: rtl;
    }
    h1 { color: #1e293b; }
    p { color: #64748b; max-width: 600px; line-height: 1.8; }
    code { background: #e2e8f0; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
    #cb-demo-error {
      display: none;
      max-width: 600px;
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      background: #fef2f2;
      color: #b91c1c;
      font-size: 14px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <h1>دمو ویجت Chat-Box</h1>
  <p>
    این صفحه شبیه‌ساز سایت مشتری است. ویجت چت در گوشهٔ پایین نمایش داده می‌شود.
    روی دکمهٔ آبی کلیک کنید تا پنجرهٔ چت باز شود.
  </p>
  <p>
    <strong>پیش‌نیاز:</strong> API باید بالا باشد و workspace با slug <code>demo</code> موجود باشد.
    اگر دکمه نمی‌بینید: <code>pnpm --filter widget build</code>
  </p>
  <div id="cb-demo-error"></div>

  <script>
    (function () {
      var origin = window.location.origin;
      var api = origin;
      var err = document.getElementById("cb-demo-error");

      function showError(msg) {
        if (!err) return;
        err.style.display = "block";
        err.textContent = msg;
      }

      var sio = document.createElement("script");
      sio.src = api + "/socket.io/socket.io.js";
      sio.onerror = function () {
        console.warn("[ChatBox demo] socket.io not loaded (optional)");
      };
      document.body.appendChild(sio);

      var w = document.createElement("script");
      w.src = origin + "/widget-demo/dist/index.global.js";
      w.dataset.apiUrl = api;
      w.dataset.workspaceSlug = "demo";
      w.onerror = function () {
        showError(
          "فایل ویجت لود نشد (" + w.src + "). روی سرور اجرا کنید: pnpm --filter widget build"
        );
      };
      document.body.appendChild(w);
    })();
  </script>
</body>
</html>
